<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom — Messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --lavender: #EAD9FF; --lavender-deep: #C9A6FF;
    --mint: #C7F5DE; --mint-deep: #8FE0B8;
    --peach: #FFD9BE; --peach-deep: #FFB98A;
    --sky: #C3E7FF; --sky-deep: #8FCCF5;
    --plum: #4A3B63; --plum-soft: #7A6B94;
    --cream: #F6F0FC; --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--plum); height: 100vh; overflow: hidden; }
  h1, .brand { font-family: 'Fredoka', sans-serif; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px; background: var(--white); box-shadow: 0 2px 12px rgba(74,59,99,0.06);
  }
  .brand { display: flex; align-items: center; gap: 8px; font-size: 22px; font-weight: 600; }
  .brand-crown { width: 26px; height: 26px; }
  .nav-cta {
    background: var(--plum); color: var(--cream); border: none; padding: 9px 20px; border-radius: 999px;
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px; cursor: pointer;
  }
  button:focus-visible, input:focus-visible { outline: 3px solid var(--sky-deep); outline-offset: 2px; }

  .layout {
    display: grid; grid-template-columns: 300px 1fr;
    height: calc(100vh - 65px);
  }

  .convo-list {
    background: var(--white); border-right: 1px solid #F0EAF8; overflow-y: auto;
  }
  .convo-list h2 { font-size: 14px; padding: 18px 20px 10px; color: var(--plum-soft); font-weight: 800; text-transform: uppercase; letter-spacing: 0.03em; }
  .convo-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer;
    transition: background 0.15s ease;
  }
  .convo-row:hover { background: var(--cream); }
  .convo-row.active { background: var(--lavender); }
  .convo-avatar {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; overflow: hidden;
    background: var(--sky); display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .convo-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .convo-info { flex: 1; min-width: 0; }
  .convo-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .convo-preview { font-size: 12px; color: var(--plum-soft); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .no-friends-msg { padding: 20px; font-size: 13px; color: var(--plum-soft); font-weight: 700; text-align: center; }

  .chat-pane { display: flex; flex-direction: column; height: 100%; }
  .chat-header {
    display: flex; align-items: center; gap: 12px; padding: 16px 24px;
    background: var(--white); border-bottom: 1px solid #F0EAF8;
  }
  .chat-header .convo-avatar { width: 38px; height: 38px; }
  .chat-header-name { font-weight: 800; font-size: 15px; }

  .messages-area {
    flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 10px;
  }
  .empty-chat {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--plum-soft); font-weight: 700; gap: 10px;
  }
  .empty-chat .icon { font-size: 40px; }

  .msg-bubble {
    max-width: 60%; padding: 10px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4;
  }
  .msg-bubble.mine {
    align-self: flex-end; background: var(--mint-deep); color: var(--plum); border-bottom-right-radius: 4px;
  }
  .msg-bubble.theirs {
    align-self: flex-start; background: var(--white); color: var(--plum); border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px rgba(74,59,99,0.06);
  }
  .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; }

  .compose-row {
    display: flex; gap: 10px; padding: 16px 24px; background: var(--white); border-top: 1px solid #F0EAF8;
  }
  .compose-row input {
    flex: 1; padding: 12px 18px; border-radius: 999px; border: 2px solid #F0EAF8;
    background: var(--cream); font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--plum);
  }
  .compose-row input:focus { outline: none; border-color: var(--lavender-deep); }
  .send-btn {
    background: var(--peach-deep); color: var(--plum); border: none; width: 44px; height: 44px;
    border-radius: 50%; font-size: 16px; cursor: pointer; flex-shrink: 0;
  }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .convo-list { display: none; }
    .convo-list.show-mobile { display: block; position: fixed; top: 65px; left: 0; right: 0; bottom: 0; z-index: 20; }
  }
</style>
</head>
<body>

<nav>
  <div class="brand">
    <svg class="brand-crown" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 28 L4 14 L12 20 L20 8 L28 20 L36 14 L34 28 Z" fill="#FFB98A" stroke="#4A3B63" stroke-width="2" stroke-linejoin="round"/>
      <rect x="5" y="28" width="30" height="5" rx="2" fill="#FFB98A" stroke="#4A3B63" stroke-width="2"/>
    </svg>
    Kingdom
  </div>
  <button class="nav-cta" onclick="window.location.href='kingdom-home.html'">Back to home</button>
</nav>

<div class="layout">
  <div class="convo-list" id="convoList">
    <h2>Friends</h2>
    <div id="convoRows"></div>
  </div>

  <div class="chat-pane">
    <div id="emptyChat" class="empty-chat">
      <div class="icon">💬</div>
      <div>Pick a friend to start chatting</div>
    </div>

    <div id="activeChat" style="display:none; flex-direction:column; height:100%;">
      <div class="chat-header">
        <div class="convo-avatar" id="chatAvatar">🙂</div>
        <div class="chat-header-name" id="chatName"></div>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="compose-row">
        <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500">
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const KingdomAuth = (() => {
  async function getCurrentUser() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return null;
    const { data: profile, error } = await supabaseClient
      .from('profiles').select('*').eq('id', user.id).single();
    if (error || !profile) return null;
    return {
      id: user.id, username: profile.username,
      displayName: profile.display_name, avatarUrl: profile.avatar_url
    };
  }
  async function requireAuth(redirectTo) {
    const user = await getCurrentUser();
    if (!user) { window.location.href = redirectTo || 'index.html'; return null; }
    return user;
  }
  return { getCurrentUser, requireAuth };
})();
</script>
<script>
const KingdomFriends = (() => {
  async function getFriends(myId) {
    const { data: friendships, error } = await supabaseClient
      .from('friendships')
      .select('id, user_a, user_b')
      .or(`user_a.eq.${myId},user_b.eq.${myId}`);
    if (error || !friendships || friendships.length === 0) return [];

    const otherIds = friendships.map(f => (f.user_a === myId ? f.user_b : f.user_a));
    const { data: profiles } = await supabaseClient
      .from('profiles').select('id, username, display_name, avatar_url').in('id', otherIds);

    const profileMap = Object.fromEntries((profiles || []).map(p => [p.id, p]));
    return friendships.map(f => {
      const otherId = f.user_a === myId ? f.user_b : f.user_a;
      const p = profileMap[otherId] || {};
      return { id: otherId, username: p.username || 'unknown', displayName: p.display_name || 'Unknown', avatarUrl: p.avatar_url };
    });
  }
  return { getFriends };
})();
</script>
<script>
const KingdomMessages = (() => {
  async function getConversation(myId, otherId) {
    const { data, error } = await supabaseClient
      .from('messages')
      .select('*')
      .or(`and(from_id.eq.${myId},to_id.eq.${otherId}),and(from_id.eq.${otherId},to_id.eq.${myId})`)
      .order('created_at', { ascending: true });
    if (error || !data) return [];
    return data;
  }
  async function sendMessage(fromId, toId, content) {
    const { data, error } = await supabaseClient
      .from('messages')
      .insert({ from_id: fromId, to_id: toId, content })
      .select().single();
    if (error) return { ok: false, error: error.message };
    return { ok: true, message: data };
  }
  function subscribeToMessages(myId, otherId, onNewMessage) {
    return supabaseClient
      .channel('messages-' + myId + '-' + otherId)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
        const m = payload.new;
        const isRelevant = (m.from_id === myId && m.to_id === otherId) || (m.from_id === otherId && m.to_id === myId);
        if (isRelevant) onNewMessage(m);
      })
      .subscribe();
  }
  return { getConversation, sendMessage, subscribeToMessages };
})();
</script>
<script>
  let currentUser = null;
  let activeFriend = null;
  let activeChannel = null;
  let renderedMessageIds = new Set();

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function avatarHtml(person) {
    if (person.avatarUrl) return `<img src="${person.avatarUrl}" alt="${escapeHtml(person.displayName)}">`;
    return '🙂';
  }

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  async function renderConvoList() {
    const friends = await KingdomFriends.getFriends(currentUser.id);
    const container = document.getElementById('convoRows');
    container.innerHTML = '';

    if (friends.length === 0) {
      container.innerHTML = '<div class="no-friends-msg">Add some friends on the home page to start chatting.</div>';
      return;
    }

    friends.forEach(friend => {
      const row = document.createElement('div');
      row.className = 'convo-row';
      row.innerHTML = `
        <div class="convo-avatar">${avatarHtml(friend)}</div>
        <div class="convo-info">
          <div class="convo-name">${escapeHtml(friend.displayName)}</div>
          <div class="convo-preview">@${escapeHtml(friend.username)}</div>
        </div>
      `;
      row.addEventListener('click', () => openChat(friend, row));
      container.appendChild(row);
    });

    const params = new URLSearchParams(window.location.search);
    const withId = params.get('with');
    if (withId) {
      const match = friends.find(f => f.id === withId);
      if (match) openChat(match);
    }
  }

  async function openChat(friend, rowEl) {
    activeFriend = friend;

    document.querySelectorAll('.convo-row').forEach(r => r.classList.remove('active'));
    if (rowEl) rowEl.classList.add('active');

    document.getElementById('emptyChat').style.display = 'none';
    document.getElementById('activeChat').style.display = 'flex';
    document.getElementById('chatAvatar').innerHTML = avatarHtml(friend);
    document.getElementById('chatName').textContent = friend.displayName;

    const url = new URL(window.location);
    url.searchParams.set('with', friend.id);
    window.history.replaceState({}, '', url);

    renderedMessageIds = new Set();
    const messagesArea = document.getElementById('messagesArea');
    messagesArea.innerHTML = '';

    const history = await KingdomMessages.getConversation(currentUser.id, friend.id);
    history.forEach(appendMessage);
    messagesArea.scrollTop = messagesArea.scrollHeight;

    if (activeChannel) supabaseClient.removeChannel(activeChannel);
    activeChannel = KingdomMessages.subscribeToMessages(currentUser.id, friend.id, (msg) => {
      appendMessage(msg);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    });
  }

  function appendMessage(msg) {
    if (renderedMessageIds.has(msg.id)) return;
    renderedMessageIds.add(msg.id);

    const bubble = document.createElement('div');
    const isMine = msg.from_id === currentUser.id;
    bubble.className = 'msg-bubble ' + (isMine ? 'mine' : 'theirs');
    bubble.innerHTML = `${escapeHtml(msg.content)}<div class="msg-time">${formatTime(msg.created_at)}</div>`;
    document.getElementById('messagesArea').appendChild(bubble);
  }

  document.getElementById('sendBtn').addEventListener('click', sendCurrentMessage);
  document.getElementById('messageInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendCurrentMessage();
  });

  async function sendCurrentMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content || !activeFriend) return;
    input.value = '';

    const result = await KingdomMessages.sendMessage(currentUser.id, activeFriend.id, content);
    if (result.ok) {
      appendMessage(result.message);
      document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
    }
  }

  (async () => {
    currentUser = await KingdomAuth.requireAuth('index.html');
    if (!currentUser) return;
    renderConvoList();
  })();
</script>

</body>
</html>
