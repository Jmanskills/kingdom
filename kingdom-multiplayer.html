<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom — Play</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --lavender: #EAD9FF; --lavender-deep: #C9A6FF;
    --mint: #C7F5DE; --mint-deep: #8FE0B8;
    --peach: #FFD9BE; --peach-deep: #FFB98A;
    --sky: #C3E7FF; --sky-deep: #8FCCF5;
    --plum: #4A3B63; --plum-soft: #7A6B94;
    --cream: #F6F0FC; --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--plum); overflow: hidden; }
  h1, .brand { font-family: 'Fredoka', sans-serif; }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: rgba(255,255,255,0.9); backdrop-filter: blur(6px);
    box-shadow: 0 2px 12px rgba(74,59,99,0.08);
  }
  .brand { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 600; }
  .brand-crown { width: 24px; height: 24px; }
  .btn {
    border: none; border-radius: 999px; font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 13px; padding: 9px 18px; cursor: pointer;
  }
  .btn-ghost { background: var(--white); color: var(--plum); box-shadow: 0 2px 8px rgba(74,59,99,0.1); }

  #canvasWrap { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
  canvas { display: block; }

  #helpBox {
    position: fixed; top: 70px; left: 24px; z-index: 20;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(6px);
    padding: 14px 18px; border-radius: 16px; font-size: 12px; font-weight: 700; color: var(--plum-soft);
    box-shadow: 0 4px 16px rgba(74,59,99,0.1); max-width: 240px; line-height: 1.6;
  }
  #helpBox strong { color: var(--plum); }

  #playersOnline {
    position: fixed; top: 70px; right: 24px; z-index: 20;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(6px);
    padding: 12px 16px; border-radius: 16px; font-size: 12px; font-weight: 800; color: var(--plum);
    box-shadow: 0 4px 16px rgba(74,59,99,0.1); max-width: 200px;
  }
  #playersOnline .title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--plum-soft); margin-bottom: 6px; }
  .player-chip { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
  .player-dot { width: 8px; height: 8px; border-radius: 50%; background: #5FCB8A; }

  #loadingMsg, #errorMsg {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 30;
    background: var(--white); padding: 24px 32px; border-radius: 20px; font-weight: 800; text-align: center;
    box-shadow: 0 10px 30px rgba(74,59,99,0.15);
  }
  #errorMsg { display: none; color: #B8433D; }

  #nameTag {
    position: absolute; z-index: 15; pointer-events: none; transform: translate(-50%, -100%);
    background: rgba(74,59,99,0.85); color: white; padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 800; white-space: nowrap;
  }
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">
    <svg class="brand-crown" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 28 L4 14 L12 20 L20 8 L28 20 L36 14 L34 28 Z" fill="#FFB98A" stroke="#4A3B63" stroke-width="2" stroke-linejoin="round"/>
      <rect x="5" y="28" width="30" height="5" rx="2" fill="#FFB98A" stroke="#4A3B63" stroke-width="2"/>
    </svg>
    <span id="realmTitle">Kingdom</span>
  </div>
  <button class="btn btn-ghost" onclick="window.location.href='kingdom-home.html'">Back to home</button>
</div>

<div id="helpBox">
  <strong>WASD</strong> to walk, <strong>Space</strong> to jump<br>
  Walk onto a block to trigger its effect<br>
  <strong>Drag</strong> to look around
</div>

<div id="playersOnline">
  <div class="title">Online here</div>
  <div id="playersList"></div>
</div>

<div id="loadingMsg">Loading kingdom...</div>
<div id="errorMsg"></div>

<div id="canvasWrap"></div>

<script>
const KingdomAuth = (() => {
  async function getCurrentUser() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return null;
    const { data: profile, error } = await supabaseClient
      .from('profiles').select('*').eq('id', user.id).single();
    if (error || !profile) return null;
    return { id: user.id, username: profile.username, displayName: profile.display_name };
  }
  async function requireAuth(redirectTo) {
    const user = await getCurrentUser();
    if (!user) { window.location.href = redirectTo || 'index.html'; return null; }
    return user;
  }
  return { getCurrentUser, requireAuth };
})();
</script>

<!-- Three.js (r128) + OrbitControls + FBXLoader -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/fflate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>

<script>
  let currentUser = null;
  let realm = null;
  let isOwner = false;
  const GRID_SIZE = 1;

  const params = new URLSearchParams(window.location.search);
  const realmId = params.get('realm');

  function showError(msg) {
    document.getElementById('loadingMsg').style.display = 'none';
    const box = document.getElementById('errorMsg');
    box.style.display = 'block';
    box.textContent = msg;
  }

  // ---------- three.js setup ----------
  const canvasWrap = document.getElementById('canvasWrap');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xF6F0FC);
  scene.fog = new THREE.Fog(0xF6F0FC, 30, 70);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  canvasWrap.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.maxPolarAngle = Math.PI / 2.05;

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(10, 20, 10);
  scene.add(sun);

  const gridHelper = new THREE.GridHelper(40, 40, 0xC9A6FF, 0xE0D4F5);
  scene.add(gridHelper);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- blocks (read-only visiting — no build/script tools here) ----------
  const blockGeo = new THREE.BoxGeometry(GRID_SIZE, GRID_SIZE, GRID_SIZE);
  const blocksGroup = new THREE.Group();
  scene.add(blocksGroup);
  const blockMap = new Map();

  function keyFor(x, y, z) { return `${x},${y},${z}`; }

  function addBlock(x, y, z, color, behavior) {
    const mat = new THREE.MeshStandardMaterial({ color });
    const mesh = new THREE.Mesh(blockGeo, mat);
    mesh.position.set(x * GRID_SIZE + GRID_SIZE / 2, y * GRID_SIZE + GRID_SIZE / 2, z * GRID_SIZE + GRID_SIZE / 2);
    mesh.userData = { gx: x, gy: y, gz: z, baseY: mesh.position.y, behavior: behavior || { type: 'none' } };
    blocksGroup.add(mesh);
    blockMap.set(keyFor(x, y, z), mesh);
  }

  function removeBlock(x, y, z) {
    const k = keyFor(x, y, z);
    const mesh = blockMap.get(k);
    if (!mesh) return;
    blocksGroup.remove(mesh);
    mesh.material.dispose();
    blockMap.delete(k);
  }

  // SAFETY: visitors (non-owners) never execute custom code blocks — only
  // the fixed preset behaviors. This prevents a kingdom owner's saved
  // JavaScript from running in a visiting player's browser.
  function runBlockScript(mesh) {
    const behavior = mesh.userData.behavior;
    if (!behavior || behavior.type === 'none') return;

    const api = {
      setColor: (hex) => { mesh.material.color.set(hex); },
      remove: () => { removeBlock(mesh.userData.gx, mesh.userData.gy, mesh.userData.gz); },
    };

    if (behavior.type === 'disappear') {
      api.remove();
    } else if (behavior.type === 'colorCycle') {
      const colors = ['#8FE0B8', '#C9A6FF', '#FFB98A', '#8FCCF5', '#FF9FC4'];
      const current = '#' + mesh.material.color.getHexString();
      const idx = colors.findIndex(c => c.toLowerCase() === current.toLowerCase());
      api.setColor(colors[(idx + 1) % colors.length]);
    } else if (behavior.type === 'custom' && isOwner && behavior.code) {
      // Only the owner's own browser will ever run their own custom code
      try {
        const fn = new Function('block', 'api', behavior.code);
        fn(mesh.userData, api);
      } catch (err) {
        console.error('Script error:', err);
      }
    }
    // 'custom' behaviors are silently skipped for non-owners — safe no-op
  }

  // ---------- local player ----------
  const player = new THREE.Group();
  const playerBodyGeo = new THREE.CylinderGeometry(0.35, 0.35, 1.6, 8);
  const playerMat = new THREE.MeshStandardMaterial({ color: 0xFF9FC4 });
  const playerMesh = new THREE.Mesh(playerBodyGeo, playerMat);
  playerMesh.position.y = 0.8;
  player.add(playerMesh);
  scene.add(player);

  let mixer = null;
  let walkAction = null;

  function loadCharacterModel(scale) {
    const fbxLoader = new THREE.FBXLoader();

    if (typeof fflate === 'undefined' || typeof THREE.FBXLoader === 'undefined') {
      console.warn('FBX dependencies failed to load — using placeholder capsule.');
      return;
    }

    fbxLoader.load(
      'Walking.fbx',
      (fbx) => {
        player.remove(playerMesh);
        fbx.scale.set(scale, scale, scale);
        fbx.position.y = 0;
        player.add(fbx);

        mixer = new THREE.AnimationMixer(fbx);
        if (fbx.animations && fbx.animations.length > 0) {
          const clip = fbx.animations[0];

          // Strip horizontal root motion so the animation walks in place —
          // our own WASD movement handles the actual forward motion.
          clip.tracks.forEach(track => {
            if (track instanceof THREE.VectorKeyframeTrack && track.name.toLowerCase().endsWith('.position')) {
              const values = track.values;
              const baseX = values[0];
              const baseZ = values[2];
              for (let i = 0; i < values.length; i += 3) {
                values[i] = baseX;
                values[i + 2] = baseZ;
              }
            }
          });

          walkAction = mixer.clipAction(clip);
          walkAction.play();
          walkAction.paused = true;
        }
      },
      undefined,
      (err) => {
        console.warn('Could not load Walking.fbx — using placeholder capsule instead.', err);
      }
    );
  }

  const PLAYER_HALF_HEIGHT = 0.8;
  const PLAYER_SPEED = 5.5;
  const GRAVITY = 18;
  const JUMP_SPEED = 7.5;
  let playerVelocityY = 0;
  let playerGrounded = false;
  let lastTouchedKey = null;
  const lastPlayerPosForCamera = new THREE.Vector3();

  const keys = {};
  window.addEventListener('keydown', (e) => { keys[e.code] = true; });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });

  function getGroundHeightBelow(x, z, fromY) {
    let best = 0;
    blockMap.forEach(mesh => {
      const bx = mesh.userData.gx, bz = mesh.userData.gz, by = mesh.userData.gy;
      if (Math.abs((bx + 0.5) - x) < 0.5 && Math.abs((bz + 0.5) - z) < 0.5) {
        const topY = by * GRID_SIZE + GRID_SIZE;
        if (topY <= fromY + 0.6 && topY > best) best = topY;
      }
    });
    return best;
  }

  function updatePlayer(dt) {
    const camDir = new THREE.Vector3();
    camera.getWorldDirection(camDir);
    camDir.y = 0; camDir.normalize();
    const camRight = new THREE.Vector3().crossVectors(camDir, new THREE.Vector3(0, 1, 0)).normalize();

    const move = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp']) move.add(camDir);
    if (keys['KeyS'] || keys['ArrowDown']) move.sub(camDir);
    if (keys['KeyD'] || keys['ArrowRight']) move.add(camRight);
    if (keys['KeyA'] || keys['ArrowLeft']) move.sub(camRight);

    if (move.lengthSq() > 0) {
      move.normalize().multiplyScalar(PLAYER_SPEED * dt);
      player.position.x += move.x;
      player.position.z += move.z;
      player.rotation.y = Math.atan2(move.x, move.z);
      if (walkAction) walkAction.paused = false;
    } else {
      if (walkAction) walkAction.paused = true;
    }

    playerVelocityY -= GRAVITY * dt;
    player.position.y += playerVelocityY * dt;

    const groundY = getGroundHeightBelow(player.position.x, player.position.z, player.position.y);
    if (player.position.y - PLAYER_HALF_HEIGHT <= groundY) {
      player.position.y = groundY + PLAYER_HALF_HEIGHT;
      playerVelocityY = 0;
      playerGrounded = true;
    } else {
      playerGrounded = false;
    }

    if (keys['Space'] && playerGrounded) {
      playerVelocityY = JUMP_SPEED;
      playerGrounded = false;
    }

    const gx = Math.floor(player.position.x);
    const gz = Math.floor(player.position.z);
    const standingY = Math.round(groundY / GRID_SIZE) - 1;
    const k = keyFor(gx, standingY, gz);
    if (k !== lastTouchedKey) {
      lastTouchedKey = k;
      const mesh = blockMap.get(k);
      if (mesh) runBlockScript(mesh);
    }

    const playerDelta = new THREE.Vector3().subVectors(player.position, lastPlayerPosForCamera);
    camera.position.add(playerDelta);
    controls.target.add(playerDelta);
    lastPlayerPosForCamera.copy(player.position);
  }

  // ---------- multiplayer: other players via Supabase Realtime ----------
  const otherPlayers = new Map(); // userId -> { mesh, nameTagEl }
  let realtimeChannel = null;

  function createOtherPlayerMesh(displayName) {
    const group = new THREE.Group();
    const mesh = new THREE.Mesh(playerBodyGeo, new THREE.MeshStandardMaterial({ color: 0x8FCCF5 }));
    mesh.position.y = 0.8;
    group.add(mesh);
    scene.add(group);

    const nameTag = document.createElement('div');
    nameTag.id = 'nameTag';
    nameTag.textContent = displayName;
    document.body.appendChild(nameTag);

    return { group, nameTag };
  }

  function removeOtherPlayer(userId) {
    const entry = otherPlayers.get(userId);
    if (!entry) return;
    scene.remove(entry.group);
    entry.nameTag.remove();
    otherPlayers.delete(userId);
    updatePlayersOnlineList();
  }

  function updatePlayersOnlineList() {
    const listEl = document.getElementById('playersList');
    const names = [currentUser.displayName + ' (you)', ...Array.from(otherPlayers.values()).map(p => p.name)];
    listEl.innerHTML = names.map(n => `<div class="player-chip"><span class="player-dot"></span>${n}</div>`).join('');
  }

  function setupMultiplayer() {
    realtimeChannel = supabaseClient.channel('kingdom-play-' + realmId, {
      config: { presence: { key: currentUser.id } }
    });

    realtimeChannel.on('broadcast', { event: 'move' }, (payload) => {
      const { userId, x, y, z, ry, displayName } = payload.payload;
      if (userId === currentUser.id) return;

      let entry = otherPlayers.get(userId);
      if (!entry) {
        const created = createOtherPlayerMesh(displayName);
        entry = { group: created.group, nameTag: created.nameTag, name: displayName };
        otherPlayers.set(userId, entry);
        updatePlayersOnlineList();
      }
      entry.group.position.set(x, y, z);
      entry.group.rotation.y = ry;
    });

    realtimeChannel.on('presence', { event: 'leave' }, ({ key }) => {
      removeOtherPlayer(key);
    });

    realtimeChannel.subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await realtimeChannel.track({ displayName: currentUser.displayName });
      }
    });

    // Broadcast our own position a few times per second — not every frame,
    // to keep network traffic reasonable
    setInterval(() => {
      if (!realtimeChannel) return;
      realtimeChannel.send({
        type: 'broadcast',
        event: 'move',
        payload: {
          userId: currentUser.id,
          displayName: currentUser.displayName,
          x: player.position.x, y: player.position.y, z: player.position.z,
          ry: player.rotation.y
        }
      });
    }, 100);
  }

  function updateNameTags() {
    otherPlayers.forEach(entry => {
      const pos = entry.group.position.clone();
      pos.y += 1.4;
      pos.project(camera);
      const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
      entry.nameTag.style.left = x + 'px';
      entry.nameTag.style.top = y + 'px';
      entry.nameTag.style.display = pos.z > 1 ? 'none' : 'block';
    });
  }

  // ---------- render loop ----------
  let t = 0;
  let lastTime = performance.now();
  function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    t += 0.05;

    blocksGroup.children.forEach(mesh => {
      if (mesh.userData.behavior && mesh.userData.behavior.type === 'bounce') {
        mesh.position.y = mesh.userData.baseY + Math.sin(t + mesh.userData.gx) * 0.15;
      }
    });

    updatePlayer(dt);
    if (mixer) mixer.update(dt);
    updateNameTags();
    controls.update();
    renderer.render(scene, camera);
  }

  // ---------- init ----------
  (async () => {
    currentUser = await KingdomAuth.requireAuth('index.html');
    if (!currentUser) return;

    if (!realmId) {
      showError('No kingdom specified.');
      return;
    }

    const { data, error } = await supabaseClient
      .from('realms').select('*').eq('id', realmId).maybeSingle();

    if (error || !data) {
      showError('Kingdom not found.');
      return;
    }

    realm = data;
    isOwner = realm.owner_id === currentUser.id;

    if (!realm.is_published && !isOwner) {
      showError('This kingdom is not published yet.');
      return;
    }

    document.getElementById('realmTitle').textContent = realm.name;
    document.getElementById('loadingMsg').style.display = 'none';

    if (Array.isArray(realm.blocks)) {
      realm.blocks.forEach(b => addBlock(b.x, b.y, b.z, b.color, b.behavior));
    }

    player.position.set(0.5, 5, 0.5);
    camera.position.set(0.5, 8.5, 7.5);
    controls.target.copy(player.position);
    lastPlayerPosForCamera.copy(player.position);

    const savedScale = typeof realm.character_scale === 'number' ? realm.character_scale : 0.0033;
    loadCharacterModel(savedScale);

    updatePlayersOnlineList();
    setupMultiplayer();
    animate();
  })();

  window.addEventListener('beforeunload', () => {
    if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
  });
</script>

</body>
</html>
